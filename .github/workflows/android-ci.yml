name: Android CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ✅ UNIT TESTS - Must Pass
      - name: Run unit tests
        run: ./gradlew test --stacktrace
        continue-on-error: false

      # ✅ INSTRUMENTED TESTS - Improved emulator settings
      - name: Run instrumented tests (Emulator API 31)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          cores: 2
          ram-size: 2048M
          disk-size: 2048M
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedAndroidTest --stacktrace

      # ✅ CODE QUALITY - Lint & Detekt
      - name: Run code quality checks
        run: ./gradlew lint detekt --stacktrace
        continue-on-error: false

      # ✅ BUILD ARTIFACTS
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ✅ TEST REPORTS
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/test-results/
            app/build/reports/tests/
          retention-days: 14

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            app/build/reports/lint-results*.html
            app/build/reports/detekt/
          retention-days: 14

      # ✅ SECURITY SCAN - Dependency vulnerabilities
      - name: Security scan - Check dependencies
        run: ./gradlew dependencyCheckAnalyze --stacktrace
        continue-on-error: true

      # ✅ PR COMMENT WITH RESULTS
      - name: Comment test results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResultsPath = 'app/build/test-results/testDebugUnitTest/';
            
            let comment = '## 🧪 Test Results\n\n';
            
            try {
              if (fs.existsSync(testResultsPath)) {
                const files = fs.readdirSync(testResultsPath);
                comment += `✅ Unit tests executed\n`;
                comment += `📊 Test results available in artifacts\n`;
              } else {
                comment += `⚠️ No test results found\n`;
              }
            } catch (error) {
              comment += `❌ Error reading test results: ${error.message}\n`;
            }
            
            comment += `\n## 📱 Build Artifacts\n\n`;
            comment += `- Debug APK: Available in artifacts\n`;
            comment += `- Release APK: Available in artifacts\n`;
            comment += `- Test Reports: Available in artifacts\n`;
            comment += `- Quality Reports: Available in artifacts\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
